# YOLOv8 Training Config
model:
  variant: yolov8
  size: s
  pretrained: true
  num_classes: 80

train:
  epochs: 100
  batch_size: 16
  img_size: 640
  optimizer: auto      # SGD, Adam, AdamW, auto
  lr0: 0.01
  lrf: 0.01
  momentum: 0.937
  weight_decay: 0.0005
  warmup_epochs: 3.0
  warmup_momentum: 0.8
  warmup_bias_lr: 0.1
  workers: 8
  cos_lr: false
  close_mosaic: 10
  amp: true
  patience: 50
  device: "0"          # GPU device(s)

augment:
  hsv_h: 0.015
  hsv_s: 0.7
  hsv_v: 0.4
  degrees: 0.0
  translate: 0.1
  scale: 0.5
  shear: 0.0
  perspective: 0.0
  flipud: 0.0
  fliplr: 0.5
  mosaic: 1.0
  mixup: 0.0

loss:
  cls:
    type: focal
    weight: 1.0
    alpha: 0.25
    gamma: 2.0
  box:
    type: ciou
    weight: 7.5
  dfl:
    type: dfl
    weight: 1.5
